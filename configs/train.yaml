model_family:
  type: depth
  default_depth: 1
  head_dim: 128
  aspect_ratio: 64
  block_size: 1024
  vocab_size: 50257
  bias: false
  dropout: 0.0
  use_sdpa: true
  rope_base: 10000.0

data:
  tokenized_dir: train_data/tokenized/gpt2/mixed

train:
  seed: 42
  learning_rate: 0.0003
  min_lr_frac: 0.1
  warmup_steps: auto
  betas: [0.9, 0.95]
  weight_decay: 0.1
  grad_clip: 1.0
  batch_size: 16
  grad_accum_steps: 8
  dtype: bf16
  compile: true
  fused_adamw: true
  allow_tf32: true
  log_interval: 10
  quick_eval_interval: 10
  quick_eval_iters: 2
  full_eval_interval: 500
  full_eval_iters: 20
  checkpoint_count: 8

output:
  root: logs
