model_family:
  type: depth
  default_depth: 1
  head_dim: 64
  aspect_ratio: 64
  block_size: 16
  vocab_size: 128
  bias: false
  dropout: 0.0
  use_sdpa: true
  rope_base: 10000.0
data:
  tokenized_dir: train_data/tokenized/gpt2/mixed
train:
  seed: 1
  learning_rate: 0.0003
  min_lr_frac: 0.1
  warmup_steps: 1
  betas: [0.9, 0.95]
  weight_decay: 0.1
  grad_clip: 1.0
  batch_size: 2
  grad_accum_steps: 1
  dtype: float32
  compile: false
  fused_adamw: false
  allow_tf32: false
  log_interval: 1
  quick_eval_interval: 1
  quick_eval_iters: 1
  full_eval_interval: 1
  full_eval_iters: 1
  checkpoint_count: 2
output:
  root: logs
